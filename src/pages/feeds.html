<div class="container">
  <!-- Шапка -->
  <div class="header">
    <div class="user-info">
      <img src="avatar.jpg" alt="User Avatar">
      <div class="greeting">
        Hello Linh! <br>
        <span class="date">October 25, 2023</span>
      </div>
    </div>
    <div class="notifications">🔔</div>
  </div>

  <!-- Строка поиска -->
  <div class="search-bar">
    <input type="text" placeholder="Search friends or neighbors">
    <div class="filter-icon">⚙️</div>
  </div>

  <!-- Истории -->
  <div class="stories">
    <div class="story add-story">+</div>
    <div class="story"><img src="story1.jpg" alt="Story"></div>
    <div class="story"><img src="story2.jpg" alt="Story"></div>
  </div>

  <!-- Пост -->
  <div class="post">
    <div class="post-header">
      <img src="author.jpg" alt="Author Avatar">
      <div class="author-info">
        <div class="name">John Doe</div>
        <div class="time">2 hours ago</div>
      </div>
    </div>
    <div class="post-text">This is a sample post text.</div>
    <img src="post-image.jpg" alt="Post Image" class="post-image">
    <div class="post-actions">
      <div class="likes">
        <i>❤️</i> 121
      </div>
      <div class="comments">
        <i>💬</i> 34
      </div>
      <div class="share">Share</div>
    </div>
  </div>

  <!-- Нижняя панель -->
  <div class="navbar">
    <i>🏠</i>
    <i>📍</i>
  </div>
</div>
